name: Open Hult submission PR

# Runs when LNQ_HULT_PAT (PAT with repo scope on r3s0lv343vr/hult-cohort-program) is set.
on:
  workflow_dispatch:
  push:
    paths:
      - submissions/r3s0lv343vr-project-2.md
    branches: [main]

jobs:
  open-pr:
    if: ${{ secrets.LNQ_HULT_PAT != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Open Hult PR
        env:
          GH_TOKEN: ${{ secrets.LNQ_HULT_PAT }}
        run: bash scripts/open-hult-pr.sh
